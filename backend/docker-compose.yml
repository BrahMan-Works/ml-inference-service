version: "3.9"

services:
  db:
    image: postgres:15
    container_name: inference_db
    environment:
      POSTGRES_DB: inference_db
      POSTGRES_USER: inference_user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inference_user -d inference_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: inference_api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: inference_db
      DB_USER: inference_user
      DB_PASSWORD: password
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility

    volumes:
      - .:/app   
volumes:
  postgres_data:
